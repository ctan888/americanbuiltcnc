<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Received | American Built CNC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: #101114;
            background: #f6f7f8;
        }
        main {
            width: min(680px, 100%);
            border: 1px solid #dedfe3;
            border-radius: 8px;
            background: #fff;
            padding: clamp(28px, 6vw, 54px);
        }
        .eyebrow {
            color: #245b73;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        h1 {
            font-size: clamp(2.1rem, 8vw, 4.4rem);
            line-height: 1.02;
            letter-spacing: 0;
            margin-bottom: 18px;
        }
        p {
            color: #5b6069;
            font-size: 1.06rem;
            line-height: 1.6;
            margin-bottom: 26px;
        }
        a {
            display: inline-flex;
            min-height: 46px;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: #b7f35b;
            color: #111;
            padding: 13px 22px;
            font-weight: 800;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main>
        <div class="eyebrow">Request received</div>
        <h1>Thanks. We got your request.</h1>
        <p>We will follow up about machine fit, pricing, installation requirements, and next steps.</p>
        <a href="/">Back to site</a>
    </main>
</body>
</html>
